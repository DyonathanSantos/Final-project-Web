<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Beleza Hub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#conteudo-principal" class="link-atalho-teclado">Ir para o conteúdo principal</a>

    <header id="cabecalho-principal">
        <div class="container header-flex">
            <a href="index.html" id="logo"><strong>✨ Beleza Hub</strong></a>
            <div class="header-interacoes">
                <nav id="menu-navegacao">
                    <ul>
                        <li><a href="index.html" id="link-inicio">Início</a></li>
                        <li><a href="cadastro.html" id="link-cadastro">Cadastro</a></li>
                        <li><a href="login.html" id="link-login" class="active">Login</a></li>
                        <li><a href="agendamento.html" id="link-agendamento" class="display-none">Agendamento</a></li>
                        <li><a href="gestao.html" id="link-gestao" class="display-none">Gestão</a></li>
                        <li><a href="perfil.html" id="link-perfil" class="display-none">Perfil</a></li>
                        <li><a href="sobre.html" id="link-sobre">Sobre</a></li>
                    </ul>
                </nav>
                <button id="btn-tema" class="btn-tema-emoji">🌙</button>
            </div>
        </div>
    </header>

    <main id="conteudo-principal" class="secao-padrao">
        <!-- Container pequeno pra não ficar aquele form gigante na tela toda -->
        <div class="container-pequeno">
            <h1 class="text-center">Acesse sua Conta</h1>
            <p class="text-center" style="margin-bottom: 20px;">Entre com suas credenciais para verificar seus compromissos ativos.</p>

            <form id="formulario-login">
                <div class="campo-grupo">
                    <label for="login-email">E-mail Cadastrado:</label>
                    <input type="email" id="login-email" required placeholder="exemplo@email.com">
                </div>

                <div class="campo-grupo">
                    <label for="login-senha">Senha de Acesso:</label>
                    <input type="password" id="login-senha" required placeholder="Digite sua senha">
                </div>

                <div class="text-center">
                    <button type="submit" class="botao-principal">Entrar na Plataforma</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container"><p>&copy; 2026 Beleza Hub. Todos os direitos reservados.</p></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
